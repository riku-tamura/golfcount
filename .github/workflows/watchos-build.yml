name: watchos-build

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  watchos-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Apple Watch app
        run: xcodebuild -project 'GolfCountApp.xcodeproj' -target 'GolfCountApp Watch App' -sdk watchos CODE_SIGNING_ALLOWED=NO build
